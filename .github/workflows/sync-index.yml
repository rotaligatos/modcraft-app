name: Sync index.html

on:
  push:
    branches: [main]
    paths: [quotation_app.html]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Copy quotation_app.html to index.html
        run: cp quotation_app.html index.html
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-sync index.html from quotation_app.html"
          git push
