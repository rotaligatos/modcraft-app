# Deploy the static site to GitHub Pages via the official Actions pipeline.
#
# Added 2026-07-03, replacing the legacy "Deploy from a branch" source. The
# branch-based site record was re-provisioned during GitHub's July 2 "Incident
# with Pages" outage window and kept failing (deploy stuck at
# deployment_queued -> 10min timeout) even after the incident was declared
# resolved. Switching to the "GitHub Actions" source creates a fresh
# deployment pipeline, and is GitHub's recommended modern setup anyway.
#
# Requires: Settings -> Pages -> Source = "GitHub Actions".
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual runs from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-flight production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'   # static site, no build step — serve the repo root
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
